<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IB Quiz — Админ-панель</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d0f14; --surface:#13161d; --surface2:#1a1e28; --border:#252a38; --accent:#3b82f6; --green:#22c55e; --red:#ef4444; --text:#e2e8f0; --text-muted:#64748b; }
    *{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;padding:24px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
    .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px}
    h1{font-family:'IBM Plex Mono',monospace;font-size:22px}.btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
    .btn:hover{border-color:var(--accent);color:var(--accent)} .btn.danger:hover{border-color:var(--red);color:var(--red)}
    .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:10px}
    table{width:100%;border-collapse:collapse;background:var(--surface)} th,td{padding:12px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px}
    th{background:var(--surface2);font-family:'IBM Plex Mono',monospace;text-align:left}
    .badges{display:flex;flex-wrap:wrap;gap:6px}.badge{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid}
    .yes{color:var(--green);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08)} .no{color:var(--red);border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08)}
    .muted{color:var(--text-muted);font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Админ-панель отправок</h1>
      <div style="display:flex;gap:8px">
        <button class="btn" id="refreshBtn">Обновить</button>
        <button class="btn danger" id="clearBtn">Очистить всё</button>
      </div>
    </div>

    <p class="muted" id="msg"></p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Время</th><th>Команда</th><th>Анкета</th><th>Инцидент 1 (кратко)</th><th>Инцидент 2 (кратко)</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

<script>
const adminPassword = prompt('Введите пароль администратора:') || '';
const rows = document.getElementById('rows');
const msg = document.getElementById('msg');

function normalizeAnswerValue(value) {
  return String(value || '').trim().toLocaleLowerCase('ru-RU');
}

function getBadgeClass(value, correctValue) {
  if (!correctValue) return 'badge';
  return normalizeAnswerValue(value) === normalizeAnswerValue(correctValue) ? 'badge yes' : 'badge no';
}

function badges(label, obj, correctObj) {
  return `<div><div class="muted" style="margin-bottom:4px">${label}</div><div class="badges">${Object.entries(obj || {}).map(([k,v]) => `<span class="${getBadgeClass(v, correctObj?.[k])}">${k}:${v}</span>`).join('')}</div></div>`;
}

function brief(answers, correctAnswers) {
  if (!answers) return '<span class="muted">Нет данных</span>';
  const incidentTypeClass = getBadgeClass(answers.incidentType, correctAnswers?.incidentType);
  return [
    badges('Что произошло', answers.what, correctAnswers?.what),
    badges('Почему произошло', answers.why, correctAnswers?.why),
    badges('Свойства', answers.properties, correctAnswers?.properties),
    badges('Угроза', answers.threat, correctAnswers?.threat),
    `<div style="margin-top:8px"><span class="muted">Тип:</span> <span class="${incidentTypeClass}">${answers.incidentType || '—'}</span></div>`
  ].join('');
}

function pickFirstValue(source, aliases) {
  if (!source || typeof source !== 'object') return '';
  for (const key of aliases) {
    const value = source[key];
    if (typeof value === 'string' && value.trim()) {
      return value.trim();
    }
  }
  return '';
}

function normalizePersonData(personData) {
  const src = personData || {};
  return {
    firstName: pickFirstValue(src, ['firstName', 'firstname', 'first_name', 'name', 'givenName', 'Имя']),
    reportDate: pickFirstValue(src, ['reportDate', 'report_date', 'date', 'reportingDate', 'Дата отчёта', 'Дата отчета'])
  };
}


function hasPersonFields(personData) {
  if (!personData || typeof personData !== 'object') return false;
  return Object.values(normalizePersonData(personData)).some(Boolean);
}

function getPersonDataForIncident(item, incidentNum) {
  const direct = item[`personData${incidentNum}`];
  if (hasPersonFields(direct)) return direct;

  const fallback = item.personData;
  if (hasPersonFields(fallback)) return fallback;

  return direct || fallback || null;
}

function parseDateParts(value) {
  const raw = String(value || '').trim();
  if (!raw) return null;
  const dotMatch = raw.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if (dotMatch) {
    return { day: Number(dotMatch[1]), month: Number(dotMatch[2]), year: Number(dotMatch[3]) };
  }
  const isoMatch = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (isoMatch) {
    return { day: Number(isoMatch[3]), month: Number(isoMatch[2]), year: Number(isoMatch[1]) };
  }
  return null;
}

function isSameDate(value, expectedDate) {
  const parsedValue = parseDateParts(value);
  const parsedExpected = parseDateParts(expectedDate);
  if (!parsedValue || !parsedExpected) return false;
  return parsedValue.day === parsedExpected.day
    && parsedValue.month === parsedExpected.month
    && parsedValue.year === parsedExpected.year;
}

function formatDateForInput(date) {
  const formatter = new Intl.DateTimeFormat('ru-RU', {
    day: '2-digit',
    month: '2-digit',
    year: 'numeric'
  });
  return formatter.format(date);
}

function resolveExpectedReportDate(correctValue) {
  const normalizedCorrectValue = normalizeAnswerValue(correctValue);
  if (normalizedCorrectValue === 'сегодня') {
    return formatDateForInput(new Date());
  }
  if (normalizedCorrectValue === 'вчера') {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    return formatDateForInput(yesterday);
  }
  return correctValue;
}

function getPersonFieldBadgeClass(fieldName, value, correctValue) {
  if (fieldName === 'reportDate') {
    const expectedReportDate = resolveExpectedReportDate(correctValue);
    return isSameDate(value, expectedReportDate) ? 'badge yes' : 'badge no';
  }
  return getBadgeClass(value, correctValue);
}

function personInfo(personData, incidentNum, correctPersonData) {
  if (!personData) return '<span class="muted">Нет данных</span>';
  const normalized = normalizePersonData(personData);
  const normalizedCorrect = normalizePersonData(correctPersonData);
  const item = (label, key, value) => `<div><span class="muted">${label}:</span> <span class="${getPersonFieldBadgeClass(key, value, normalizedCorrect[key])}">${value || '—'}</span></div>`;
  return [
    `<div style="margin-bottom:6px"><strong>Инцидент ${incidentNum}</strong></div>`,
    item('Имя', 'firstName', normalized.firstName),
    item('Дата отчёта', 'reportDate', normalized.reportDate)
  ].join('');
}

async function loadSubmissions() {
  msg.textContent = '';
  const response = await fetch('/api/submissions', {
    headers: { Authorization: `Bearer ${adminPassword}` }
  });

  if (!response.ok) {
    msg.textContent = 'Не удалось авторизоваться или загрузить данные.';
    rows.innerHTML = '';
    return;
  }

  const submissions = await response.json();
  const answerKeysByTeamId = {};
  const teamIds = [...new Set(submissions.map((item) => Number(item.teamId)).filter(Boolean))];
  await Promise.all(teamIds.map(async (teamId) => {
    const answerResponse = await fetch(`/api/answer-keys/${teamId}`, {
      headers: { Authorization: `Bearer ${adminPassword}` }
    });
    if (!answerResponse.ok) return;
    answerKeysByTeamId[teamId] = await answerResponse.json();
  }));

  if (!submissions.length) {
    rows.innerHTML = '<tr><td colspan="5" class="muted">Пока нет отправок.</td></tr>';
    return;
  }

  rows.innerHTML = submissions.map((item) => {
    const correctAnswers = answerKeysByTeamId[item.teamId] || {};
    return `
    <tr>
      <td>${new Date(item.timestamp).toLocaleString('ru-RU')}</td>
      <td>Команда ${item.teamId}</td>
      <td>
        ${personInfo(getPersonDataForIncident(item, 1), 1, correctAnswers.personData1)}
        <hr style="border:none;border-top:1px solid var(--border);margin:8px 0">
        ${personInfo(getPersonDataForIncident(item, 2), 2, correctAnswers.personData2)}
      </td>
      <td>${brief(item.answers1, correctAnswers.answers1)}</td>
      <td>${brief(item.answers2, correctAnswers.answers2)}</td>
    </tr>
  `;
  }).join('');
}

document.getElementById('refreshBtn').addEventListener('click', loadSubmissions);
document.getElementById('clearBtn').addEventListener('click', async () => {
  if (!confirm('Удалить все отправки?')) return;
  const response = await fetch('/api/submissions', {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${adminPassword}` }
  });
  if (!response.ok) {
    msg.textContent = 'Ошибка при очистке.';
    return;
  }
  loadSubmissions();
});

loadSubmissions();
</script>
</body>
</html>
