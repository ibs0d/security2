<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IB Quiz — Админ-панель</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f8fafc; --surface:#ffffff; --surface2:#f1f5f9; --border:#e2e8f0; --accent:#2563eb; --green:#16a34a; --red:#dc2626; --text:#1e293b; --text-muted:#64748b; }
    *{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;padding:24px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.06) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
    .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px}
    h1{font-family:'IBM Plex Mono',monospace;font-size:22px}.btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
    .btn:hover{border-color:var(--accent);color:var(--accent)} .btn.danger:hover{border-color:var(--red);color:var(--red)}
    .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:10px}
    table{width:100%;border-collapse:collapse;background:var(--surface)} th,td{padding:12px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px}
    th{background:var(--surface2);font-family:'IBM Plex Mono',monospace;text-align:left}
    .badges{display:flex;flex-wrap:wrap;gap:6px}.badge{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid}
    .yes{color:var(--green);border-color:rgba(22,163,74,.3);background:rgba(22,163,74,.08)} .no{color:var(--red);border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.08)}
    .muted{color:var(--text-muted);font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Админ-панель отправок</h1>
      <div style="display:flex;gap:8px">
        <button class="btn" id="refreshBtn">Обновить</button>
        <button class="btn danger" id="clearBtn">Очистить всё</button>
      </div>
    </div>

    <p class="muted" id="msg"></p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Время</th><th>Команда</th><th>Инцидент 1</th><th>Инцидент 2</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

<script>
const adminPassword = prompt('Введите пароль администратора:') || '';
const rows = document.getElementById('rows');
const msg = document.getElementById('msg');

const labels = {
  what: [
    'Получение подозрительного письма с вредоносной ссылкой или вложением',
    'Обнаружение вируса на рабочей станции',
    'Подозрительная активность после успешного входа',
    'Передача конфиденциальной информации сторонним лицам',
    'Звонок от «руководства» с запросом конфиденциальных данных'
  ],
  why: [
    'Сотрудник не распознал признаки фишингового письма',
    'Человеческая ошибка при выборе получателя в почтовом клиенте',
    'Сотрудник использовал слишком простой пароль',
    'Сотрудник подключил личный USB-накопитель в обход политики ИБ'
  ],
  properties: [
    'Конфиденциальность',
    'Целостность',
    'Доступность'
  ],
  threat: [
    'Мошенничество',
    'Взлом данных',
    'Кража данных',
    'Вирусная атака',
    'Человеческий фактор'
  ]
};

function norm(v) {
  return String(v || '').trim().toLocaleLowerCase('ru-RU');
}

function isCorrect(value, correctValue) {
  if (!correctValue) return null;
  return norm(value) === norm(correctValue);
}

function renderSection(title, obj, correctObj, labelList) {
  if (!obj) return '';
  const items = Object.entries(obj).map(([k, v]) => {
    const label = labelList[Number(k) - 1] || k;
    const correct = isCorrect(v, correctObj?.[k]);
    const cls = correct === null ? 'badge' : correct ? 'badge yes' : 'badge no';
    return `<span class="${cls}">${label}</span>`;
  }).join('');
  return `<div style="margin-bottom:8px"><div class="muted" style="margin-bottom:4px">${title}</div><div class="badges">${items}</div></div>`;
}

function personInfo(personData) {
  if (!personData) return '';
  const name = personData.firstName || personData.name || '';
  const date = personData.reportDate || personData.date || '';
  if (!name && !date) return '';
  const parts = [];
  if (name) parts.push(`<span class="muted">Имя:</span> ${name}`);
  if (date) parts.push(`<span class="muted">Дата:</span> ${date}`);
  return `<div style="margin-bottom:10px;font-size:12px">${parts.join(' &nbsp; ')}</div>`;
}

function brief(answers, correctAnswers, personData) {
  if (!answers) return '<span class="muted">Нет данных</span>';
  const typeCorrect = isCorrect(answers.incidentType, correctAnswers?.incidentType);
  const typeCls = typeCorrect === null ? 'badge' : typeCorrect ? 'badge yes' : 'badge no';
  return [
    personInfo(personData),
    renderSection('Что произошло', answers.what, correctAnswers?.what, labels.what),
    renderSection('Почему произошло', answers.why, correctAnswers?.why, labels.why),
    renderSection('Свойства', answers.properties, correctAnswers?.properties, labels.properties),
    renderSection('Угроза', answers.threat, correctAnswers?.threat, labels.threat),
    `<div style="margin-top:4px"><span class="muted">Тип:</span> <span class="${typeCls}">${answers.incidentType || '—'}</span></div>`
  ].join('');
}

async function loadSubmissions() {
  msg.textContent = '';
  const response = await fetch('/api/submissions', {
    headers: { Authorization: `Bearer ${adminPassword}` }
  });

  if (!response.ok) {
    msg.textContent = 'Не удалось авторизоваться или загрузить данные.';
    rows.innerHTML = '';
    return;
  }

  const submissions = await response.json();
  const answerKeysByTeamId = {};
  const teamIds = [...new Set(submissions.map((item) => Number(item.teamId)).filter(Boolean))];
  await Promise.all(teamIds.map(async (teamId) => {
    const answerResponse = await fetch(`/api/answer-keys/${teamId}`, {
      headers: { Authorization: `Bearer ${adminPassword}` }
    });
    if (!answerResponse.ok) return;
    answerKeysByTeamId[teamId] = await answerResponse.json();
  }));

  if (!submissions.length) {
    rows.innerHTML = '<tr><td colspan="4" class="muted">Пока нет отправок.</td></tr>';
    return;
  }

  rows.innerHTML = submissions.map((item) => {
    const correctAnswers = answerKeysByTeamId[item.teamId] || {};
    return `
    <tr>
      <td>${new Date(item.timestamp).toLocaleString('ru-RU')}</td>
      <td>Команда ${item.teamId}</td>
      <td>${brief(item.answers1, correctAnswers.answers1, item.personData1 || item.personData)}</td>
      <td>${brief(item.answers2, correctAnswers.answers2, item.personData2 || item.personData)}</td>
    </tr>
  `;
  }).join('');
}

document.getElementById('refreshBtn').addEventListener('click', loadSubmissions);
document.getElementById('clearBtn').addEventListener('click', async () => {
  if (!confirm('Удалить все отправки?')) return;
  const response = await fetch('/api/submissions', {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${adminPassword}` }
  });
  if (!response.ok) {
    msg.textContent = 'Ошибка при очистке.';
    return;
  }
  loadSubmissions();
});

loadSubmissions();
</script>
</body>
</html>
