<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IB Quiz — Викторина</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f8fafc; --surface:#ffffff; --surface2:#f1f5f9; --border:#e2e8f0; --border-active:#2563eb; --text:#1e293b; --text-muted:#64748b; --text-dim:#475569; --accent:#2563eb; --green:#16a34a; --red:#dc2626; --yes-bg:rgba(22,163,74,.08); --yes-border:rgba(22,163,74,.3); --no-bg:rgba(220,38,38,.06); --no-border:rgba(220,38,38,.2); }
    *{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-weight:500;min-height:100vh;padding:30px 16px 70px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.06) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    .wrapper{max-width:860px;margin:0 auto;position:relative;z-index:1}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .link{color:var(--text-muted);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px}.link:hover{color:var(--accent)}
    .header{text-align:center;margin-bottom:20px}.task-badge{display:inline-block;background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.25);border-radius:4px;padding:4px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:14px}
    h1{font-family:'IBM Plex Mono',monospace;font-size:clamp(16px,3vw,23px)}
    .pages{position:relative}.page{transition:all .35s ease}.hidden{display:none}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}.card-header{padding:14px 20px;background:var(--surface2);border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
    .incident-card{position:sticky;top:10px;z-index:5}
    .incident-box{padding:15px 18px;color:var(--text);white-space:pre-wrap;line-height:1.55;font-family:'IBM Plex Mono',monospace;font-size:13px}
    .check-item{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)} .check-item:last-child{border-bottom:none}
    .check-text{font-size:13.5px;color:var(--text-dim);font-weight:600;flex:1}
    .toggle-group{display:flex;gap:6px}.toggle-btn{padding:5px 14px;border-radius:4px;border:1px solid var(--border);background:transparent;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;color:var(--text-muted);transition:.15s}
    .toggle-btn.yes.active{background:var(--yes-bg);border-color:var(--yes-border);color:var(--green)} .toggle-btn.no.active{background:var(--no-bg);border-color:var(--no-border);color:var(--red)}
    .props-row{display:flex}.prop-item{flex:1;padding:16px;border-right:1px solid var(--border);text-align:center}.prop-item:last-child{border-right:none}.prop-label{display:block;margin-bottom:10px;color:var(--text-dim)}
    .submit-section{text-align:center;padding-top:6px}.submit-btn{background:var(--accent);color:#fff;border:none;padding:14px 30px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;cursor:pointer}
    .submit-btn:hover{background:#2563eb}
    .error-line{position:sticky;top:10px;z-index:8;color:var(--red);margin-bottom:14px;text-align:center;min-height:18px;background:rgba(248,250,252,.95);padding:6px 10px;border-radius:6px;border:1px solid transparent}
    .error-line:not(:empty){border-color:rgba(239,68,68,.35)}
    .manual-fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:16px 20px}
    .manual-field{display:flex;flex-direction:column;gap:6px}
    .manual-field.full{grid-column:1/-1}
    .manual-field label{font-size:12px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace}
    .manual-field input{background:#ffffff;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:14px;font-weight:600}
    .manual-field input:focus{outline:none;border-color:var(--border-active)}
    .assistant-block{margin-top:18px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
    .assistant-block.hidden{display:none}
    .assistant-title{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
    .assistant-status{font-size:14px;color:var(--text-dim);margin-bottom:12px;min-height:22px}
    .assistant-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .assistant-card{border:1px solid var(--border);border-radius:8px;background:var(--surface2);padding:12px}
    .assistant-name{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-muted);margin-bottom:8px}
    .assistant-typing{font-size:13px;line-height:1.45;min-height:62px;white-space:pre-wrap}
    .assistant-coins{display:inline-block;margin-top:8px;padding:4px 8px;border-radius:999px;border:1px solid var(--border);font-size:11px;font-family:'IBM Plex Mono',monospace}
    .assistant-coins.super{border-color:rgba(37,99,235,.4);background:rgba(37,99,235,.08);color:var(--accent)}
    .assistant-coins.regular{border-color:rgba(22,163,74,.35);background:rgba(22,163,74,.08);color:var(--green)}
    .criteria-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
    .criteria-line{font-size:12px;line-height:1.3}
    .criteria-line.yes{color:var(--green)}
    .criteria-line.no{color:var(--red)}
    .thinking-dots::after{content:' .';animation:dots 1.1s steps(3,end) infinite}
    @keyframes dots{0%{content:' .'}33%{content:' ..'}66%{content:' ...'}100%{content:' .'}}
    @media(max-width:700px){.manual-fields{grid-template-columns:1fr}.props-row{flex-direction:column}.prop-item{border-right:none;border-bottom:1px solid var(--border)}.prop-item:last-child{border-bottom:none}.check-item{flex-direction:column;align-items:flex-start}.incident-card{top:46px}.error-line{top:6px}.assistant-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="topbar">
      <span class="link">Тренировка ИБ</span>
      <a class="link" href="#" id="logout">Выйти</a>
    </div>
    <div class="header">
      <div class="task-badge" id="taskBadge">Отчёт команды</div>
      <h1 id="mainTitle">ОТЧЁТ О СОБЫТИИ ИНФОРМАЦИОННОЙ БЕЗОПАСНОСТИ</h1>
    </div>
    <div id="pageError" class="error-line"></div>
    <div class="pages">
      <section id="page1" class="page"></section>
      <section id="page2" class="page hidden"></section>
    </div>
  </div>

  <div id="assistantResult" class="assistant-block hidden">
    <div class="assistant-title">Ассистент преподавателя</div>
    <div id="assistantStatus" class="assistant-status"></div>
    <div class="assistant-grid">
      <div class="assistant-card" id="assistantCard1">
        <div class="assistant-name" id="assistantName1">Участник 1</div>
        <div class="assistant-typing" id="assistantText1"></div>
        <div class="criteria-list" id="assistantCriteria1"></div>
      </div>
      <div class="assistant-card" id="assistantCard2">
        <div class="assistant-name" id="assistantName2">Участник 2</div>
        <div class="assistant-typing" id="assistantText2"></div>
        <div class="criteria-list" id="assistantCriteria2"></div>
      </div>
    </div>
  </div>
  <div class="wrapper">
    <div class="submit-section">
      <button class="submit-btn hidden" id="openAdditionalFormBtn">Открыть дополнительную форму</button>
    </div>
  </div>

<script>
const sections = {
  what:[
    'Получение подозрительного письма с вредоносной ссылкой или вложением','Обнаружение вируса на рабочей станции','Подозрительная активность после успешного входа','Передача конфиденциальной информации сторонним лицам','Звонок от «руководства» с запросом конфиденциальных данных'
  ],
  why:['Сотрудник не распознал признаки фишингового письма','Человеческая ошибка при выборе получателя в почтовом клиенте','Сотрудник использовал слишком простой пароль','Сотрудник подключил личный USB-накопитель в обход политики ИБ'],
  props:['Конфиденциальность','Целостность','Доступность'],
  threat:['Мошенничество','Взлом данных','Кража данных','Вирусная атака','Человеческий фактор']
};

const rawTeamId = localStorage.getItem('teamId');
const isDemo = rawTeamId === 'demo';
const teamId = isDemo ? 'demo' : Number(rawTeamId);
if (!teamId) window.location.href = '/';
const MAIN_STORAGE_KEY = `quizDraft_team_${teamId}`;
const ADDITIONAL_STORAGE_KEY = `quizDraft_team_${teamId}_additional`;

let incident1 = ''; let incident2 = '';
let answers1 = null;
let answerKey = null;
let isEvaluating = false;
let isAdditionalMode = false;
let quizStorageKey = MAIN_STORAGE_KEY;

function getCurrentStep() {
  return document.getElementById('page2').classList.contains('hidden') ? 1 : 2;
}

function showStep(step, pushHistory = false) {
  const page1 = document.getElementById('page1');
  const page2 = document.getElementById('page2');
  if (!page1 || !page2) return;

  if (step === 2) {
    page1.classList.add('hidden');
    page2.classList.remove('hidden');
  } else {
    page2.classList.add('hidden');
    page1.classList.remove('hidden');
  }

  if (pushHistory) {
    history.pushState({ step }, '', step === 2 ? '#step-2' : '#step-1');
  } else {
    history.replaceState({ step }, '', step === 2 ? '#step-2' : '#step-1');
  }
}

function reportProgress() {
  if (isDemo || isAdditionalMode) return;
  const allFields = document.querySelectorAll('input[id]');
  let filled = 0;
  let total = 0;
  allFields.forEach((input) => {
    total++;
    if (input.value && input.value.trim()) filled++;
  });
  fetch('/api/progress', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ teamId, filled, total })
  }).catch(() => {});
}

function saveDraft() {
  const savedInputs = Array.from(document.querySelectorAll('input[id]'));
  const values = Object.fromEntries(savedInputs.map((input) => [input.id, input.value || '']));
  const payload = { step: getCurrentStep(), values };
  localStorage.setItem(quizStorageKey, JSON.stringify(payload));
  reportProgress();
}

function restoreDraft() {
  const raw = localStorage.getItem(quizStorageKey);
  if (!raw) return 1;

  try {
    const parsed = JSON.parse(raw);
    const values = parsed.values || {};
    Object.entries(values).forEach(([id, value]) => {
      const hidden = document.getElementById(id);
      if (hidden) hidden.value = value;
    });

    document.querySelectorAll('.toggle-group[data-hidden]').forEach((group) => {
      const hiddenId = group.getAttribute('data-hidden');
      const hidden = document.getElementById(hiddenId);
      if (!hidden) return;
      group.querySelectorAll('.toggle-btn').forEach((btn) => btn.classList.remove('active'));
      if (hidden.value === 'ДА') {
        group.querySelector('.yes')?.classList.add('active');
      } else if (hidden.value === 'НЕТ') {
        group.querySelector('.no')?.classList.add('active');
      }
    });

    return parsed.step === 2 ? 2 : 1;
  } catch (e) {
    localStorage.removeItem(quizStorageKey);
    return 1;
  }
}

document.getElementById('logout').addEventListener('click', (e) => {
  e.preventDefault();
  localStorage.removeItem('teamId');
  localStorage.removeItem(MAIN_STORAGE_KEY);
  localStorage.removeItem(ADDITIONAL_STORAGE_KEY);
  window.location.href = '/';
});

function toggle(btn, type, hiddenId) {
  const group = btn.closest('.toggle-group');
  group.querySelectorAll('.toggle-btn').forEach((b) => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(hiddenId).value = type === 'yes' ? 'ДА' : 'НЕТ';
  saveDraft();
}
function toggleExclusive(btn, type, thisId, otherId) {
  toggle(btn, type, thisId);
  const other = document.querySelector(`[data-hidden="${otherId}"]`);
  if (!other) return;

  other.querySelectorAll('.toggle-btn').forEach((b) => b.classList.remove('active'));
  if (type === 'yes') {
    document.getElementById(otherId).value = 'НЕТ';
    other.querySelector('.no').classList.add('active');
  } else {
    document.getElementById(otherId).value = 'ДА';
    other.querySelector('.yes').classList.add('active');
  }
  saveDraft();
}

function createToggleItem(text, key, exclusive) {
  const fn = exclusive ? `toggleExclusive(this,'yes','${key}','${exclusive}')` : `toggle(this,'yes','${key}')`;
  const fnNo = exclusive ? `toggleExclusive(this,'no','${key}','${exclusive}')` : `toggle(this,'no','${key}')`;
  return `<li class="check-item"><span class="check-text">${text}</span><div class="toggle-group" data-hidden="${key}"><button class="toggle-btn yes" onclick="${fn}">ДА</button><button class="toggle-btn no" onclick="${fnNo}">НЕТ</button></div><input type="hidden" id="${key}"></li>`;
}

function getTodayFormatted() {
  const d = new Date();
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  return `${dd}.${mm}.${yyyy}`;
}

function createPersonFields(suffix) {
  const todayFormatted = getTodayFormatted();
  return `
    <div class="card">
      <div class="card-header">Данные для отчёта по инциденту №${suffix}</div>
      <div class="manual-fields">
        <div class="manual-field">
          <label for="firstName_${suffix}">Имя</label>
          <input id="firstName_${suffix}" type="text" required autocomplete="given-name">
        </div>
        <div class="manual-field">
          <label for="reportDate_${suffix}">Дата отчёта (ДД.ММ.ГГГГ)</label>
          <input id="reportDate_${suffix}" type="text" required inputmode="numeric" value="${todayFormatted}">
        </div>
      </div>
    </div>
  `;
}

function renderPage(containerId, incidentNum, text, suffix) {
  const box = document.getElementById(containerId);
  box.innerHTML = `
    <div class="card incident-card"><div class="card-header">Инцидент №${incidentNum}</div><div class="incident-box">${text}</div></div>
    ${createPersonFields(suffix)}
    <div class="card"><div class="card-header">Укажите что произошло</div>${sections.what.map((t,i)=>createToggleItem(t,`what${i+1}_${suffix}`)).join('')}</div>
    <div class="card"><div class="card-header">Укажите почему произошло</div>${sections.why.map((t,i)=>createToggleItem(t,`why${i+1}_${suffix}`)).join('')}</div>
    <div class="card"><div class="card-header">Какие свойства информации подверглись атаке</div><div class="props-row">${sections.props.map((t,i)=>`<div class="prop-item"><span class="prop-label">${t}</span><div class="toggle-group" data-hidden="prop${i+1}_${suffix}"><button class="toggle-btn yes" onclick="toggle(this,'yes','prop${i+1}_${suffix}')">ДА</button><button class="toggle-btn no" onclick="toggle(this,'no','prop${i+1}_${suffix}')">НЕТ</button></div><input type="hidden" id="prop${i+1}_${suffix}"></div>`).join('')}</div></div>
    <div class="card"><div class="card-header">Укажите вид угрозы ИБ</div>${sections.threat.map((t,i)=>createToggleItem(t,`thr${i+1}_${suffix}`)).join('')}</div>
    <div class="card"><div class="card-header">О каком происшествии идёт речь</div><div class="props-row"><div class="prop-item"><span class="prop-label">Событие ИБ</span><div class="toggle-group" data-hidden="inc1_${suffix}"><button class="toggle-btn yes" onclick="toggleExclusive(this,'yes','inc1_${suffix}','inc2_${suffix}')">ДА</button><button class="toggle-btn no" onclick="toggleExclusive(this,'no','inc1_${suffix}','inc2_${suffix}')">НЕТ</button></div><input type="hidden" id="inc1_${suffix}"></div><div class="prop-item"><span class="prop-label">Инцидент ИБ</span><div class="toggle-group" data-hidden="inc2_${suffix}"><button class="toggle-btn yes" onclick="toggleExclusive(this,'yes','inc2_${suffix}','inc1_${suffix}')">ДА</button><button class="toggle-btn no" onclick="toggleExclusive(this,'no','inc2_${suffix}','inc1_${suffix}')">НЕТ</button></div><input type="hidden" id="inc2_${suffix}"></div></div></div>
    <div class="submit-section">
      ${suffix===2?'<button class="submit-btn" id="back_2" style="margin-right:10px;background:transparent;border:1px solid var(--border);color:var(--text)">← Назад</button>':''}
      <button class="submit-btn" id="btn_${suffix}">${suffix===1?'Далее →': isDemo ? 'Проверить ответы в демо' : 'Передать ответы ассистенту преподавателя'}</button>
    </div>
  `;
}

function collectAnswers(suffix) {
  const pick = (prefix, count) => Object.fromEntries(Array.from({length:count}, (_,i)=>[String(i+1), document.getElementById(`${prefix}${i+1}_${suffix}`).value || '']));
  const type = document.getElementById(`inc1_${suffix}`).value === 'ДА' ? 'Событие ИБ' : (document.getElementById(`inc2_${suffix}`).value === 'ДА' ? 'Инцидент ИБ' : '');
  return {
    what: pick('what',5), why: pick('why',4), properties: pick('prop',3), threat: pick('thr',5), incidentType: type
  };
}

function isValid(a) {
  const allAnswered = (obj) => Object.values(obj).every((v) => v === 'ДА' || v === 'НЕТ');
  return allAnswered(a.what) && allAnswered(a.why) && allAnswered(a.properties) && allAnswered(a.threat) && Boolean(a.incidentType);
}

function asYesNo(v){ return v === 'ДА' ? 'ДА' : 'НЕТ'; }
function collectPersonData(suffix) {
  return {
    firstName: document.getElementById(`firstName_${suffix}`).value.trim(),
    reportDate: document.getElementById(`reportDate_${suffix}`).value.trim()
  };
}

function isValidReportDate(value) {
  if (!/^\d{2}\.\d{2}\.\d{4}$/.test(value)) return false;
  const [dayRaw, monthRaw, yearRaw] = value.split('.');
  const day = Number(dayRaw);
  const month = Number(monthRaw);
  const year = Number(yearRaw);
  const date = new Date(year, month - 1, day);
  return date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day;
}

function validatePersonData(personData) {
  const allFilled = Object.values(personData).every((value) => value.length > 0);
  if (!allFilled) {
    return 'Заполните все поля блока «Данные для отчёта».';
  }
  if (!isValidReportDate(personData.reportDate)) {
    return 'Дата отчёта должна быть в формате ДД.ММ.ГГГГ и быть корректной календарной датой.';
  }
  return '';
}

function buildIncidentAnswersText(a){
return `Что произошло:\n- Получение подозрительного письма: ${asYesNo(a.what['1'])}\n- Обнаружение вируса: ${asYesNo(a.what['2'])}\n- Подозрительная активность после входа: ${asYesNo(a.what['3'])}\n- Передача конфиденциальной информации: ${asYesNo(a.what['4'])}\n- Звонок от руководства: ${asYesNo(a.what['5'])}\n\nПочему произошло:\n- Не распознал фишинг: ${asYesNo(a.why['1'])}\n- Ошибка при выборе получателя: ${asYesNo(a.why['2'])}\n- Простой пароль: ${asYesNo(a.why['3'])}\n- USB-накопитель: ${asYesNo(a.why['4'])}\n\nСвойства информации под угрозой:\n- Конфиденциальность: ${asYesNo(a.properties['1'])}\n- Целостность: ${asYesNo(a.properties['2'])}\n- Доступность: ${asYesNo(a.properties['3'])}\n\nВид угрозы:\n- Мошенничество: ${asYesNo(a.threat['1'])}\n- Взлом данных: ${asYesNo(a.threat['2'])}\n- Кража данных: ${asYesNo(a.threat['3'])}\n- Вирусная атака: ${asYesNo(a.threat['4'])}\n- Человеческий фактор: ${asYesNo(a.threat['5'])}\n\nТип происшествия: ${a.incidentType}`;
}

function norm(v) {
  return String(v || '').trim().toLocaleLowerCase('ru-RU');
}

function isCorrect(value, correctValue) {
  if (!correctValue) return null;
  return norm(value) === norm(correctValue);
}

function compareSection(sectionAnswers, sectionKey, labels) {
  if (!sectionAnswers || !sectionKey) return [];
  return Object.entries(sectionKey).map(([key, expected]) => {
    const answer = sectionAnswers[key];
    const correct = isCorrect(answer, expected);
    const label = labels[Number(key) - 1] || `Критерий ${key}`;
    return { label, correct, participantAnswer: asYesNo(answer) };
  }).filter((item) => item.correct !== null);
}

function evaluateParticipant(answers, correctAnswers) {
  const labels = {
    what: sections.what,
    why: sections.why,
    properties: sections.props,
    threat: sections.threat
  };

  const checks = [
    ...compareSection(answers?.what, correctAnswers?.what, labels.what),
    ...compareSection(answers?.why, correctAnswers?.why, labels.why),
    ...compareSection(answers?.properties, correctAnswers?.properties, labels.properties),
    ...compareSection(answers?.threat, correctAnswers?.threat, labels.threat)
  ];

  if (correctAnswers?.incidentType) {
    checks.push({
      label: 'Тип происшествия',
      correct: isCorrect(answers?.incidentType, correctAnswers.incidentType),
      participantAnswer: answers?.incidentType || '—'
    });
  }

  const total = checks.length;
  const correct = checks.filter((item) => item.correct).length;
  const percentRaw = total > 0 ? (correct / total) * 100 : 0;
  const percent = Math.min(100, Math.ceil(percentRaw));
  return { checks, total, correct, percent };
}

function getCoinReward(percent) {
  if (percent <= 30) {
    return { label: '1 коин', variant: 'regular' };
  }
  if (percent <= 60) {
    return { label: '2 коина', variant: 'regular' };
  }
  if (percent <= 85) {
    return { label: '3 коина', variant: 'regular' };
  }
  return { label: 'Супер коин', variant: 'super' };
}

function renderCriteria(targetId, checks) {
  const target = document.getElementById(targetId);
  target.innerHTML = checks.map((item) => {
    const cls = item.correct ? 'yes' : 'no';
    const mark = item.correct ? '✓' : '✗';
    const participantAnswer = item.participantAnswer ? ` (${item.participantAnswer})` : '';
    return `<div class="criteria-line ${cls}">${mark} ${item.label}${participantAnswer}</div>`;
  }).join('');
}

function typeWriter(elementId, text, speed = 20) {
  return new Promise((resolve) => {
    const element = document.getElementById(elementId);
    element.textContent = '';
    let index = 0;
    const timer = setInterval(() => {
      element.textContent += text[index] || '';
      index += 1;
      if (index >= text.length) {
        clearInterval(timer);
        resolve();
      }
    }, speed);
  });
}

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function scrollToAssistantResult() {
  const block = document.getElementById('assistantResult');
  if (!block) return;
  block.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderColumnWithRandomTiming(config) {
  const {
    textId,
    text,
    speed,
    initialDelay,
    criteriaId,
    checks,
    reward
  } = config;

  return new Promise((resolve) => {
    setTimeout(async () => {
      await typeWriter(textId, text, speed);
      renderCriteria(criteriaId, checks);
      document.getElementById(textId).insertAdjacentHTML('beforeend', `<br><span class="assistant-coins ${reward.variant}">${reward.label}</span>`);
      resolve();
    }, initialDelay);
  });
}

async function renderAssistantResult(personData1, personData2, result1, result2) {
  const block = document.getElementById('assistantResult');
  const status = document.getElementById('assistantStatus');
  block.classList.remove('hidden');
  scrollToAssistantResult();
  status.textContent = 'Ассистент проверяет ответы';
  status.classList.add('thinking-dots');

  document.getElementById('assistantName1').textContent = `${personData1.firstName} — Инцидент 1`;
  document.getElementById('assistantName2').textContent = `${personData2.firstName} — Инцидент 2`;
  document.getElementById('assistantText1').textContent = '';
  document.getElementById('assistantText2').textContent = '';
  document.getElementById('assistantCriteria1').innerHTML = '';
  document.getElementById('assistantCriteria2').innerHTML = '';

  const thinkMs = (Math.floor(Math.random() * 8) + 5) * 1000;
  await new Promise((resolve) => setTimeout(resolve, thinkMs));

  status.classList.remove('thinking-dots');
  status.textContent = 'Проверка завершена ✅';

  const reward1 = getCoinReward(result1.percent);
  const reward2 = getCoinReward(result2.percent);
  const text1 = `Привет, ${personData1.firstName}! Ты правильно отметил(а) ${result1.correct} из ${result1.total} критериев (${result1.percent}%). Твоя награда: ${reward1.label}.`;
  const text2 = `Привет, ${personData2.firstName}! Ты правильно отметил(а) ${result2.correct} из ${result2.total} критериев (${result2.percent}%). Твоя награда: ${reward2.label}.`;

  const speed1 = randomInt(16, 27);
  const speed2 = randomInt(16, 27);
  const delay1 = randomInt(100, 1200);
  const delay2 = randomInt(100, 1200);

  await Promise.all([
    renderColumnWithRandomTiming({
      textId: 'assistantText1',
      text: text1,
      speed: speed1,
      initialDelay: delay1,
      criteriaId: 'assistantCriteria1',
      checks: result1.checks,
      reward: reward1
    }),
    renderColumnWithRandomTiming({
      textId: 'assistantText2',
      text: text2,
      speed: speed2,
      initialDelay: delay2,
      criteriaId: 'assistantCriteria2',
      checks: result2.checks,
      reward: reward2
    })
  ]);
}

async function loadForm(isAdditional) {
  const query = isAdditional ? '?additional=1' : '';
  const response = await fetch(`/api/scenarios/${teamId}${query}`);
  if (!response.ok) throw new Error('Не удалось загрузить сценарии');
  const data = await response.json();
  incident1 = data.incident1;
  incident2 = data.incident2;

  const answerResponse = await fetch(`/api/team-answer-key/${teamId}${query}`);
  answerKey = answerResponse.ok ? await answerResponse.json() : null;

  isAdditionalMode = isAdditional;
  quizStorageKey = isAdditional ? ADDITIONAL_STORAGE_KEY : MAIN_STORAGE_KEY;
  document.getElementById('taskBadge').textContent = isAdditional ? 'Дополнительная форма' : (isDemo ? 'Демо' : 'Отчёт команды');
  renderPage('page1', 1, incident1, 1);
  renderPage('page2', 2, incident2, 2);
  document.querySelectorAll('.manual-field input').forEach((input) => input.addEventListener('input', saveDraft));
  const restoredStep = restoreDraft();
  showStep(restoredStep, false);
  reportProgress();
}

function bindPageActions() {
  document.getElementById('btn_1').addEventListener('click', () => {
    const personData1 = collectPersonData(1);
    const personValidationError = validatePersonData(personData1);
    if (personValidationError) {
      document.getElementById('pageError').textContent = personValidationError;
      return;
    }
    const a1 = collectAnswers(1);
    if (!isValid(a1)) {
      document.getElementById('pageError').textContent = 'Заполните все вопросы в каждом разделе и выберите тип происшествия.';
      return;
    }
    answers1 = a1;
    document.getElementById('pageError').textContent = '';
    showStep(2, true);
    saveDraft();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  document.getElementById('back_2').addEventListener('click', () => {
    document.getElementById('pageError').textContent = '';
    showStep(1, true);
    saveDraft();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  document.getElementById('btn_2').addEventListener('click', async () => {
    if (isEvaluating) return;
    const personData1 = collectPersonData(1);
    const personData2 = collectPersonData(2);
    const personValidationError1 = validatePersonData(personData1);
    const personValidationError2 = validatePersonData(personData2);
    if (personValidationError1 || personValidationError2) {
      document.getElementById('pageError').textContent = personValidationError1 || personValidationError2;
      return;
    }
    const a1 = collectAnswers(1);
    const a2 = collectAnswers(2);
    if (!isValid(a1) || !isValid(a2)) {
      document.getElementById('pageError').textContent = 'Заполните все вопросы в каждом разделе и выберите тип происшествия.';
      return;
    }
    document.getElementById('pageError').textContent = '';
    answers1 = a1;

    if (!answerKey) {
      document.getElementById('pageError').textContent = 'Не удалось загрузить критерии проверки. Обратитесь к преподавателю.';
      return;
    }

    const btn = document.getElementById('btn_2');
    const previousText = btn.textContent;
    btn.textContent = 'Проверяем ответы...';
    btn.disabled = true;
    isEvaluating = true;
    scrollToAssistantResult();

    if (!isDemo) {
      const send = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          teamId,
          formType: isAdditionalMode ? 'additional' : 'main',
          personData1,
          personData2,
          incidentText1: incident1,
          incidentText2: incident2,
          answers1,
          answers2: a2
        })
      });
      if (!send.ok) {
        document.getElementById('pageError').textContent = 'Не удалось отправить результаты.';
        btn.textContent = previousText;
        btn.disabled = false;
        isEvaluating = false;
        return;
      }
    }

    const result1 = evaluateParticipant(a1, answerKey.answers1);
    const result2 = evaluateParticipant(a2, answerKey.answers2);
    await renderAssistantResult(personData1, personData2, result1, result2);
    localStorage.removeItem(quizStorageKey);
    if (!isAdditionalMode) {
      document.getElementById('openAdditionalFormBtn').classList.remove('hidden');
    }
    btn.textContent = previousText;
    btn.disabled = false;
    isEvaluating = false;
  });
}

(async function init(){
  try {
    if (isDemo) {
      document.getElementById('taskBadge').textContent = 'Демо';
      document.getElementById('mainTitle').textContent = 'ДЕМО — ПРИМЕР ЗАПОЛНЕНИЯ ФОРМЫ';
    }

    await loadForm(false);
    bindPageActions();

    window.addEventListener('popstate', (event) => {
      const stepFromState = event.state?.step;
      showStep(stepFromState === 2 ? 2 : 1, false);
      saveDraft();
    });

    document.getElementById('openAdditionalFormBtn').addEventListener('click', async () => {
      document.getElementById('openAdditionalFormBtn').classList.add('hidden');
      document.getElementById('assistantResult').classList.add('hidden');
      document.getElementById('assistantStatus').textContent = '';
      await loadForm(true);
      bindPageActions();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  } catch (e) {
    document.getElementById('pageError').textContent = 'Ошибка загрузки данных команды.';
  }
})();
</script>
