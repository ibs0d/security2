<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IB Quiz — Викторина</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d0f14; --surface:#13161d; --surface2:#1a1e28; --border:#252a38; --border-active:#3b82f6; --text:#e2e8f0; --text-muted:#64748b; --text-dim:#94a3b8; --accent:#3b82f6; --green:#22c55e; --red:#ef4444; --yes-bg:rgba(34,197,94,.08); --yes-border:rgba(34,197,94,.3); --no-bg:rgba(239,68,68,.06); --no-border:rgba(239,68,68,.2); }
    *{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;padding:30px 16px 70px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    .wrapper{max-width:860px;margin:0 auto;position:relative;z-index:1}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .link{color:var(--text-muted);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px}.link:hover{color:var(--accent)}
    .header{text-align:center;margin-bottom:20px}.task-badge{display:inline-block;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);border-radius:4px;padding:4px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:14px}
    h1{font-family:'IBM Plex Mono',monospace;font-size:clamp(16px,3vw,23px)}
    .pages{position:relative;overflow:hidden}.page{transition:all .35s ease}.hidden{display:none}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}.card-header{padding:14px 20px;background:var(--surface2);border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
    .incident-card{position:sticky;top:10px;z-index:5}
    .incident-box{padding:15px 18px;color:var(--green);white-space:pre-wrap;line-height:1.55;font-family:'IBM Plex Mono',monospace;font-size:13px}
    .check-item{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)} .check-item:last-child{border-bottom:none}
    .check-text{font-size:13.5px;color:var(--text-dim);flex:1}
    .toggle-group{display:flex;gap:6px}.toggle-btn{padding:5px 14px;border-radius:4px;border:1px solid var(--border);background:transparent;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;color:var(--text-muted);transition:.15s}
    .toggle-btn.yes.active{background:var(--yes-bg);border-color:var(--yes-border);color:var(--green)} .toggle-btn.no.active{background:var(--no-bg);border-color:var(--no-border);color:var(--red)}
    .props-row{display:flex}.prop-item{flex:1;padding:16px;border-right:1px solid var(--border);text-align:center}.prop-item:last-child{border-right:none}.prop-label{display:block;margin-bottom:10px;color:var(--text-dim)}
    .submit-section{text-align:center;padding-top:6px}.submit-btn{background:var(--accent);color:#fff;border:none;padding:14px 30px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;cursor:pointer}
    .submit-btn:hover{background:#2563eb}
    .error-line{position:sticky;top:10px;z-index:8;color:var(--red);margin-bottom:14px;text-align:center;min-height:18px;background:rgba(13,15,20,.95);padding:6px 10px;border-radius:6px;border:1px solid transparent}
    .error-line:not(:empty){border-color:rgba(239,68,68,.35)}
    .manual-fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:16px 20px}
    .manual-field{display:flex;flex-direction:column;gap:6px}
    .manual-field.full{grid-column:1/-1}
    .manual-field label{font-size:12px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace}
    .manual-field input{background:#0b0e13;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:14px}
    .manual-field input:focus{outline:none;border-color:var(--border-active)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;padding:24px;align-items:center;justify-content:center}.modal-overlay.show{display:flex}
    .modal{width:min(920px,100%);height:min(92vh,100%);background:var(--surface);border:1px solid var(--border-active);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:14px}
    textarea{flex:1;background:#0b0e13;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px;resize:none;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.45}
    .copy-btn{background:var(--accent);border:none;color:white;padding:14px;border-radius:8px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:18px}
    @media(max-width:700px){.manual-fields{grid-template-columns:1fr}.props-row{flex-direction:column}.prop-item{border-right:none;border-bottom:1px solid var(--border)}.prop-item:last-child{border-bottom:none}.check-item{flex-direction:column;align-items:flex-start}.incident-card{top:46px}.error-line{top:6px}}
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="topbar">
      <span class="link">Тренировка ИБ</span>
      <a class="link" href="#" id="logout">Выйти</a>
    </div>
    <div class="header">
      <div class="task-badge">Отчёт команды</div>
      <h1>ОТЧЁТ О СОБЫТИИ ИНФОРМАЦИОННОЙ БЕЗОПАСНОСТИ</h1>
    </div>
    <div id="pageError" class="error-line"></div>
    <div class="pages">
      <section id="page1" class="page"></section>
      <section id="page2" class="page hidden"></section>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2 style="font-family:'IBM Plex Mono',monospace;color:var(--accent)">Промпт для Qwen</h2>
      <textarea id="promptText" readonly></textarea>
      <button class="copy-btn" id="copyBtn">Скопировать и перейти к ассистенту преподавателя</button>
    </div>
  </div>

<script>
const sections = {
  what:[
    'Получение подозрительного письма с вредоносной ссылкой или вложением','Обнаружение вируса на рабочей станции','Подозрительная активность после успешного входа','Передача конфиденциальной информации сторонним лицам','Звонок от «руководства» с запросом конфиденциальных данных'
  ],
  why:['Сотрудник не распознал признаки фишингового письма','Человеческая ошибка при выборе получателя в почтовом клиенте','Сотрудник использовал слишком простой пароль','Сотрудник подключил личный USB-накопитель в обход политики ИБ'],
  props:['Конфиденциальность','Целостность','Доступность'],
  threat:['Мошенничество','Взлом данных','Кража данных','Вирусная атака','Человеческий фактор']
};

const teamId = Number(localStorage.getItem('teamId'));
if (!teamId) window.location.href = '/';
const QUIZ_STORAGE_KEY = `quizDraft_team_${teamId}`;

let incident1 = ''; let incident2 = '';
let answers1 = null;

function getCurrentStep() {
  return document.getElementById('page2').classList.contains('hidden') ? 1 : 2;
}

function showStep(step, pushHistory = false) {
  const page1 = document.getElementById('page1');
  const page2 = document.getElementById('page2');
  if (!page1 || !page2) return;

  if (step === 2) {
    page1.classList.add('hidden');
    page2.classList.remove('hidden');
  } else {
    page2.classList.add('hidden');
    page1.classList.remove('hidden');
  }

  if (pushHistory) {
    history.pushState({ step }, '', step === 2 ? '#step-2' : '#step-1');
  } else {
    history.replaceState({ step }, '', step === 2 ? '#step-2' : '#step-1');
  }
}

function saveDraft() {
  const savedInputs = Array.from(document.querySelectorAll('input[id]'));
  const values = Object.fromEntries(savedInputs.map((input) => [input.id, input.value || '']));
  const payload = { step: getCurrentStep(), values };
  localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(payload));
}

function restoreDraft() {
  const raw = localStorage.getItem(QUIZ_STORAGE_KEY);
  if (!raw) return 1;

  try {
    const parsed = JSON.parse(raw);
    const values = parsed.values || {};
    Object.entries(values).forEach(([id, value]) => {
      const hidden = document.getElementById(id);
      if (hidden) hidden.value = value;
    });

    document.querySelectorAll('.toggle-group[data-hidden]').forEach((group) => {
      const hiddenId = group.getAttribute('data-hidden');
      const hidden = document.getElementById(hiddenId);
      if (!hidden) return;
      group.querySelectorAll('.toggle-btn').forEach((btn) => btn.classList.remove('active'));
      if (hidden.value === 'ДА') {
        group.querySelector('.yes')?.classList.add('active');
      } else if (hidden.value === 'НЕТ') {
        group.querySelector('.no')?.classList.add('active');
      }
    });

    return parsed.step === 2 ? 2 : 1;
  } catch (e) {
    localStorage.removeItem(QUIZ_STORAGE_KEY);
    return 1;
  }
}

document.getElementById('logout').addEventListener('click', (e) => {
  e.preventDefault();
  localStorage.removeItem('teamId');
  localStorage.removeItem(QUIZ_STORAGE_KEY);
  window.location.href = '/';
});

function toggle(btn, type, hiddenId) {
  const group = btn.closest('.toggle-group');
  group.querySelectorAll('.toggle-btn').forEach((b) => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(hiddenId).value = type === 'yes' ? 'ДА' : 'НЕТ';
  saveDraft();
}
function toggleExclusive(btn, type, thisId, otherId) {
  toggle(btn, type, thisId);
  const other = document.querySelector(`[data-hidden="${otherId}"]`);
  if (!other) return;

  other.querySelectorAll('.toggle-btn').forEach((b) => b.classList.remove('active'));
  if (type === 'yes') {
    document.getElementById(otherId).value = 'НЕТ';
    other.querySelector('.no').classList.add('active');
  } else {
    document.getElementById(otherId).value = 'ДА';
    other.querySelector('.yes').classList.add('active');
  }
  saveDraft();
}

function createToggleItem(text, key, exclusive) {
  const fn = exclusive ? `toggleExclusive(this,'yes','${key}','${exclusive}')` : `toggle(this,'yes','${key}')`;
  const fnNo = exclusive ? `toggleExclusive(this,'no','${key}','${exclusive}')` : `toggle(this,'no','${key}')`;
  return `<li class="check-item"><span class="check-text">${text}</span><div class="toggle-group" data-hidden="${key}"><button class="toggle-btn yes" onclick="${fn}">ДА</button><button class="toggle-btn no" onclick="${fnNo}">НЕТ</button></div><input type="hidden" id="${key}"></li>`;
}

function createPersonFields(suffix) {
  return `
    <div class="card">
      <div class="card-header">Данные для отчёта по инциденту №${suffix}</div>
      <div class="manual-fields">
        <div class="manual-field">
          <label for="lastName_${suffix}">Фамилия</label>
          <input id="lastName_${suffix}" type="text" required autocomplete="family-name">
        </div>
        <div class="manual-field">
          <label for="firstName_${suffix}">Имя</label>
          <input id="firstName_${suffix}" type="text" required autocomplete="given-name">
        </div>
        <div class="manual-field">
          <label for="middleName_${suffix}">Отчество</label>
          <input id="middleName_${suffix}" type="text" required autocomplete="additional-name">
        </div>
        <div class="manual-field">
          <label for="position_${suffix}">Должность</label>
          <input id="position_${suffix}" type="text" required>
        </div>
        <div class="manual-field">
          <label for="department_${suffix}">Отдел</label>
          <input id="department_${suffix}" type="text" required>
        </div>
        <div class="manual-field">
          <label for="reportDate_${suffix}">Дата отчёта (ДД.ММ.ГГГГ)</label>
          <input id="reportDate_${suffix}" type="text" required inputmode="numeric" placeholder="01.01.2026">
        </div>
      </div>
    </div>
  `;
}

function renderPage(containerId, incidentNum, text, suffix) {
  const box = document.getElementById(containerId);
  box.innerHTML = `
    <div class="card incident-card"><div class="card-header">Инцидент №${incidentNum}</div><div class="incident-box">${text}</div></div>
    ${createPersonFields(suffix)}
    <div class="card"><div class="card-header">Укажите что произошло</div>${sections.what.map((t,i)=>createToggleItem(t,`what${i+1}_${suffix}`)).join('')}</div>
    <div class="card"><div class="card-header">Укажите почему произошло</div>${sections.why.map((t,i)=>createToggleItem(t,`why${i+1}_${suffix}`)).join('')}</div>
    <div class="card"><div class="card-header">Какие свойства информации подверглись атаке</div><div class="props-row">${sections.props.map((t,i)=>`<div class="prop-item"><span class="prop-label">${t}</span><div class="toggle-group" data-hidden="prop${i+1}_${suffix}"><button class="toggle-btn yes" onclick="toggle(this,'yes','prop${i+1}_${suffix}')">ДА</button><button class="toggle-btn no" onclick="toggle(this,'no','prop${i+1}_${suffix}')">НЕТ</button></div><input type="hidden" id="prop${i+1}_${suffix}"></div>`).join('')}</div></div>
    <div class="card"><div class="card-header">Укажите вид угрозы ИБ</div>${sections.threat.map((t,i)=>createToggleItem(t,`thr${i+1}_${suffix}`)).join('')}</div>
    <div class="card"><div class="card-header">О каком происшествии идёт речь</div><div class="props-row"><div class="prop-item"><span class="prop-label">Событие ИБ</span><div class="toggle-group" data-hidden="inc1_${suffix}"><button class="toggle-btn yes" onclick="toggleExclusive(this,'yes','inc1_${suffix}','inc2_${suffix}')">ДА</button><button class="toggle-btn no" onclick="toggleExclusive(this,'no','inc1_${suffix}','inc2_${suffix}')">НЕТ</button></div><input type="hidden" id="inc1_${suffix}"></div><div class="prop-item"><span class="prop-label">Инцидент ИБ</span><div class="toggle-group" data-hidden="inc2_${suffix}"><button class="toggle-btn yes" onclick="toggleExclusive(this,'yes','inc2_${suffix}','inc1_${suffix}')">ДА</button><button class="toggle-btn no" onclick="toggleExclusive(this,'no','inc2_${suffix}','inc1_${suffix}')">НЕТ</button></div><input type="hidden" id="inc2_${suffix}"></div></div></div>
    <div class="submit-section">
      ${suffix===2?'<button class="submit-btn" id="back_2" style="margin-right:10px;background:transparent;border:1px solid var(--border);color:var(--text)">← Назад</button>':''}
      <button class="submit-btn" id="btn_${suffix}">${suffix===1?'Далее →':'Отправить и получить промпт'}</button>
    </div>
  `;
}

function collectAnswers(suffix) {
  const pick = (prefix, count) => Object.fromEntries(Array.from({length:count}, (_,i)=>[String(i+1), document.getElementById(`${prefix}${i+1}_${suffix}`).value || '']));
  const type = document.getElementById(`inc1_${suffix}`).value === 'ДА' ? 'Событие ИБ' : (document.getElementById(`inc2_${suffix}`).value === 'ДА' ? 'Инцидент ИБ' : '');
  return {
    what: pick('what',5), why: pick('why',4), properties: pick('prop',3), threat: pick('thr',5), incidentType: type
  };
}

function isValid(a) {
  const allAnswered = (obj) => Object.values(obj).every((v) => v === 'ДА' || v === 'НЕТ');
  return allAnswered(a.what) && allAnswered(a.why) && allAnswered(a.properties) && allAnswered(a.threat) && Boolean(a.incidentType);
}

function asYesNo(v){ return v === 'ДА' ? 'ДА' : 'НЕТ'; }
function collectPersonData(suffix) {
  return {
    lastName: document.getElementById(`lastName_${suffix}`).value.trim(),
    firstName: document.getElementById(`firstName_${suffix}`).value.trim(),
    middleName: document.getElementById(`middleName_${suffix}`).value.trim(),
    position: document.getElementById(`position_${suffix}`).value.trim(),
    department: document.getElementById(`department_${suffix}`).value.trim(),
    reportDate: document.getElementById(`reportDate_${suffix}`).value.trim()
  };
}

function isValidReportDate(value) {
  if (!/^\d{2}\.\d{2}\.\d{4}$/.test(value)) return false;
  const [dayRaw, monthRaw, yearRaw] = value.split('.');
  const day = Number(dayRaw);
  const month = Number(monthRaw);
  const year = Number(yearRaw);
  const date = new Date(year, month - 1, day);
  return date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day;
}

function validatePersonData(personData) {
  const allFilled = Object.values(personData).every((value) => value.length > 0);
  if (!allFilled) {
    return 'Заполните все поля блока «Данные для отчёта».';
  }
  if (!isValidReportDate(personData.reportDate)) {
    return 'Дата отчёта должна быть в формате ДД.ММ.ГГГГ и быть корректной календарной датой.';
  }
  return '';
}

function buildIncidentAnswersText(a){
return `Что произошло:\n- Получение подозрительного письма: ${asYesNo(a.what['1'])}\n- Обнаружение вируса: ${asYesNo(a.what['2'])}\n- Подозрительная активность после входа: ${asYesNo(a.what['3'])}\n- Передача конфиденциальной информации: ${asYesNo(a.what['4'])}\n- Звонок от руководства: ${asYesNo(a.what['5'])}\n\nПочему произошло:\n- Не распознал фишинг: ${asYesNo(a.why['1'])}\n- Ошибка при выборе получателя: ${asYesNo(a.why['2'])}\n- Простой пароль: ${asYesNo(a.why['3'])}\n- USB-накопитель: ${asYesNo(a.why['4'])}\n\nСвойства информации под угрозой:\n- Конфиденциальность: ${asYesNo(a.properties['1'])}\n- Целостность: ${asYesNo(a.properties['2'])}\n- Доступность: ${asYesNo(a.properties['3'])}\n\nВид угрозы:\n- Мошенничество: ${asYesNo(a.threat['1'])}\n- Взлом данных: ${asYesNo(a.threat['2'])}\n- Кража данных: ${asYesNo(a.threat['3'])}\n- Вирусная атака: ${asYesNo(a.threat['4'])}\n- Человеческий фактор: ${asYesNo(a.threat['5'])}\n\nТип происшествия: ${a.incidentType}`;
}

function encodeToBase64(value) {
  return btoa(unescape(encodeURIComponent(value)));
}

function buildPrompt(personData1, a1, personData2, a2) {
const rawPrompt = `Ты эксперт по информационной безопасности и оцениваешь работу команды школьников.\n\n## Инцидент 1\n${incident1}\n\n### Данные отчёта по инциденту 1\n- Фамилия: ${personData1.lastName}\n- Имя: ${personData1.firstName}\n- Отчество: ${personData1.middleName}\n- Должность: ${personData1.position}\n- Отдел: ${personData1.department}\n- Дата отчёта: ${personData1.reportDate}\n\n### Ответы команды по инциденту 1:\n${buildIncidentAnswersText(a1)}\n\n## Инцидент 2\n${incident2}\n\n### Данные отчёта по инциденту 2\n- Фамилия: ${personData2.lastName}\n- Имя: ${personData2.firstName}\n- Отчество: ${personData2.middleName}\n- Должность: ${personData2.position}\n- Отдел: ${personData2.department}\n- Дата отчёта: ${personData2.reportDate}\n\n### Ответы команды по инциденту 2:\n${buildIncidentAnswersText(a2)}\n\n## Оцени работу команды:\nДля каждого инцидента:\n1. Проверь правильность классификации того, что произошло\n2. Проверь правильность определения причины\n3. Оцени верность определения затронутых свойств информации (конфиденциальность, целостность, доступность — триада ЦРУ)\n4. Проверь правильность определения вида угрозы\n5. Проверь правильно ли команда определила: это Событие ИБ или Инцидент ИБ\n\nПо каждому пункту напиши: правильно ли, и кратко объясни почему.\nВ конце дай общую оценку по 10-балльной шкале и краткий итог.`;
const encodedPrompt = encodeToBase64(rawPrompt);
return `Промпт закодирован в base64\n${encodedPrompt}`;
}

(async function init(){
  try {
    const response = await fetch(`/api/scenarios/${teamId}`);
    if (!response.ok) throw new Error('Не удалось загрузить сценарии');
    const data = await response.json();
    incident1 = data.incident1;
    incident2 = data.incident2;

    renderPage('page1', 1, incident1, 1);
    renderPage('page2', 2, incident2, 2);
    document.querySelectorAll('.manual-field input').forEach((input) => {
      input.addEventListener('input', saveDraft);
    });
    const restoredStep = restoreDraft();
    showStep(restoredStep, false);

    document.getElementById('btn_1').addEventListener('click', () => {
      const personData1 = collectPersonData(1);
      const personValidationError = validatePersonData(personData1);
      if (personValidationError) {
        document.getElementById('pageError').textContent = personValidationError;
        return;
      }
      const a1 = collectAnswers(1);
      if (!isValid(a1)) {
        document.getElementById('pageError').textContent = 'Заполните все вопросы в каждом разделе и выберите тип происшествия.';
        return;
      }
      answers1 = a1;
      document.getElementById('pageError').textContent = '';
      showStep(2, true);
      saveDraft();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('back_2').addEventListener('click', () => {
      document.getElementById('pageError').textContent = '';
      showStep(1, true);
      saveDraft();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    window.addEventListener('popstate', (event) => {
      const stepFromState = event.state?.step;
      showStep(stepFromState === 2 ? 2 : 1, false);
      saveDraft();
    });

    document.getElementById('btn_2').addEventListener('click', async () => {
      const personData1 = collectPersonData(1);
      const personData2 = collectPersonData(2);
      const personValidationError1 = validatePersonData(personData1);
      const personValidationError2 = validatePersonData(personData2);
      if (personValidationError1 || personValidationError2) {
        document.getElementById('pageError').textContent = personValidationError1 || personValidationError2;
        return;
      }
      const a1 = collectAnswers(1);
      const a2 = collectAnswers(2);
      if (!isValid(a1) || !isValid(a2)) {
        document.getElementById('pageError').textContent = 'Заполните все вопросы в каждом разделе и выберите тип происшествия.';
        return;
      }
      document.getElementById('pageError').textContent = '';
      answers1 = a1;

      const send = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ teamId, personData1, personData2, answers1, answers2: a2 })
      });
      if (!send.ok) {
        document.getElementById('pageError').textContent = 'Не удалось отправить результаты.';
        return;
      }

      document.getElementById('promptText').value = buildPrompt(personData1, answers1, personData2, a2);
      document.getElementById('modal').classList.add('show');
      localStorage.removeItem(QUIZ_STORAGE_KEY);
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      const confirmed = window.confirm('Скопировать закодированный промпт и перейти к ассистенту преподавателя?');
      if (!confirmed) return;

      await navigator.clipboard.writeText(document.getElementById('promptText').value);
      window.open('https://chat.qwen.ai/', '_blank', 'noopener,noreferrer');
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Скопировано!';
      setTimeout(() => btn.textContent = 'Скопировать и перейти к ассистенту преподавателя', 1500);
    });
  } catch (e) {
    document.getElementById('pageError').textContent = 'Ошибка загрузки данных команды.';
  }
})();
</script>
</body>
</html>
